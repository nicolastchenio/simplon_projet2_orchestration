name: CI

# Déclenchement sur push ou PR sur main, dev, ou feat/*
on:
  push:
    branches:
      - main
      - dev
      - 'feat/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python et uv
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      # 3️⃣ Installer uv et dépendances
      - name: Install uv and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      # 4️⃣ Linting avec Ruff
      - name: Lint code with Ruff
        run: uv run ruff check .

      # 5️⃣ Tests unitaires avec pytest et couverture XML
      - name: Run tests with pytest
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

      # 6️⃣ Audit de sécurité
      - name: Secret scanning
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -r --exclude-dir=.git -n -E '([A-Za-z0-9_]{20,})' .

      # 7️⃣ Générer le badge de couverture dynamique
      - name: Generate coverage badge SVG
        run: |
          sudo apt-get update && sudo apt-get install -y xmlstarlet bc

          # Lire la couverture depuis coverage.xml
          TOTAL=$(xmlstarlet sel -t -v "/coverage/@line-rate" coverage.xml)
          PERCENT=$(echo "$TOTAL*100" | bc | cut -d'.' -f1)

          # Couleur selon coverage
          if [ "$PERCENT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PERCENT" -ge 75 ]; then COLOR="yellowgreen"
          elif [ "$PERCENT" -ge 50 ]; then COLOR="yellow"
          else COLOR="red"
          fi

          # Créer le dossier badges si nécessaire
          mkdir -p badges

          # Générer le SVG du badge
          cat > badges/coverage.svg <<EOF
<svg xmlns="http://www.w3.org/2000/svg" width="110" height="20">
  <linearGradient id="b" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <mask id="a">
    <rect width="110" height="20" rx="3" fill="#fff"/>
  </mask>
  <g mask="url(#a)">
    <rect width="60" height="20" fill="#555"/>
    <rect x="60" width="50" height="20" fill="$COLOR"/>
    <rect width="110" height="20" fill="url(#b)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="30" y="14">coverage</text>
    <text x="85" y="14">$PERCENT%</text>
  </g>
</svg>
EOF

      # 8️⃣ Commit et push du badge sur la branche actuelle
      - name: Commit coverage badge
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/coverage.svg
          git diff --cached --quiet || git commit -m "Update coverage badge"
          git push origin HEAD